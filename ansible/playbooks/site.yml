---
- name: Provision CockroachDB cluster
  hosts: cockroachdb
  become: true
  # Defer fact gathering until every host is reachable. Without this, a
  # slow-booting VM (~60s late on SSH) takes its host out of the play and
  # the cluster comes up short. wait_for_connection runs through the same
  # connection plugin as everything else, so it validates the actual SSH
  # path Ansible will use — not just raw TCP on port 22.
  gather_facts: false

  pre_tasks:
    - name: Wait for SSH to be reachable on every node (handles slow VM boots)
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 0
        sleep: 5

    - name: Gather facts now that all hosts are reachable
      ansible.builtin.setup:

    - name: Sanity check — inventory must be non-empty
      ansible.builtin.assert:
        that:
          - groups['cockroachdb'] is defined
          - groups['cockroachdb'] | length > 0
        fail_msg: "Inventory has no cockroachdb hosts. Run 'make inventory' (or ansible/inventory/render.sh) after terraform apply."
      run_once: true
      delegate_to: localhost
      become: false

    - name: Sanity check — every host must carry locality and zone vars
      ansible.builtin.assert:
        that:
          - private_ip is defined and private_ip | length > 0
          - crdb_locality_label is defined and crdb_locality_label | length > 0
          - crdb_gce_zone is defined and crdb_gce_zone | length > 0
        fail_msg: "Host {{ inventory_hostname }} is missing private_ip / crdb_locality_label / crdb_gce_zone. Re-run inventory render."

  roles:
    - cockroachdb
